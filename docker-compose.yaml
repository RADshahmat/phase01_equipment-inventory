version: "3.9"

services:

  postgres:
    image: postgres:15

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend

    env_file:
      - .env

    ports:
      - "5000:5000"

    depends_on:
      postgres:
        condition: service_healthy

    command: sh -c "npm run seed && npm start"

  frontend:
    build:
      context: ./frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data: